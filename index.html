<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebuild with no guidelines</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Tasks and Weather App</h1>
        <section id="tasks-section">

            <h3 id="task-stats-title">Task Statistics</h3>
            <div id="task-statistics-container">
                <p id="total-task-count" class="task-stats">Total Task Count: 0</p>
                <p id="completed-task-count" class="task-stats">Completed Task Count: 0</p>
                <p id="incomplete-task-count" class="task-stats">Incomplete Task Count: 0</p>
            </div>

            <h3 id="task-filters-title">Task Filters</h3>
            <div id="task-filters-container">
                <button id="all-tasks" class="task-filter-buttons">All</button>
                <button id="completed-tasks" class="task-filter-buttons">Complete</button>
                <button id="incomplete-tasks" class="task-filter-buttons">Incomplete</button>
            </div>

            <div id="search-container">
                <h3 id="search-title">Search Filter</h3>
                <div id="search-filter-input-container">
                    <input id="search-input" type="text" placeholder="search for something...">
                </div>
            </div>

            <div id="tasks-container">
                <h3 id="tasks-title">Tasks</h3>

                <div id="task-user-inputs-container">
                    <input type="text" id="task-input" placeholder="add a task">
                    <button id="new-task-button" class="task-buttons">Add Task</button>
                    <button id="clear-tasks" class="task-buttons">Clear Tasks</button>
                </div>

                <ul id="task-list"></ul>
            </div>
        </section>

        <section id="weather-section">
            <h3 id="weather-title">Weather</h3>
            <button id="get-weather-button">Get Current Weather</button>
            <ul id="weather-info-list">
                <li id="location-li" class="weather-info-item">Location: Houston</li>
                <li id="temp-li" class="weather-info-item">Temperature: </li>
                <li id="condition-li" class="weather-info-item">Condition: </li>
                <li id="status-li" class="weather-info-item">Status: </li>
            </ul>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
